services:
  - type: web
    name: osint-biometric-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    initialDeployHook: npm run seed
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: FRONTEND_URL
        value: https://osint-biometric-frontend-95cy.onrender.com

      - key: SMTP_HOST
        sync: false

      - key: SMTP_PORT
        sync: false

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASS
        sync: false

      - key: SMTP_FROM
        sync: false


  - type: web
    name: osint-biometric-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://osint-biometric-api-1t8v.onrender.com/api